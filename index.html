<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Split an image into a customizable grid and download all tiles as a ZIP.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <title>Grid Your Post</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="preview-section">
        
        <div class="canvas-wrapper">
            <canvas id="previewCanvas"></canvas>
        </div>

    </div>

    <div class="controls">

        <div class="upload-box">
            <input type="file" id="imageInput" accept="image/*" aria-label="Upload image">
        </div>

        <h2>Pengaturan Grid</h2>

        <div class="control-group">
            <label>
                Baris:
                <span id="rowsValue">3</span>
            </label>

            <input type="range" id="rows" min="1" max="10" value="3" aria-label="Rows slider">
        </div>

        <div class="control-group">
            <label>
                Kolom:
                <span id="colsValue">3</span>
            </label>

            <input type="range" id="cols" min="1" max="10" value="3" aria-label="Columns slider">
        </div>

        <div class="control-group">
            <label>
                Potongan Margin:
                <span id="cropValue">1.5</span>%
            </label>

            <input type="range" id="cropPercent" min="0" max="5" step="0.1" value="1.5" aria-label="Crop percentage slider">
        </div>

        <button id="splitBtn" aria-label="Split image">Split Image</button>

        <button id="saveBtn" aria-label="Download all tiles">Download All Tiles</button>

        <div id="results"></div>
<div id="statusMessage" role="status" aria-live="polite"></div>
        
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
